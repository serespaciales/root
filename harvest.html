<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Finder</title>
    <link rel="stylesheet" href="harvest.css">
</head>
<body>
    <div id="header-container">
        <h1>harvest</h1>
        <form id="seed-finder">
            <label>
                search your seed id here
                <input type="text" id="seedId" name="seed" maxlength="7" required>
            </label>
            <button type="button" id="lookupBtn">search seed</button>
            <div id="seedError"></div> <!-- Moved here for better UX -->
        </form>
    </div>
    <div id="main-content">
        <div id="seed-container">
            <h2>plant</h2>
            <div id="canvas-wrapper"></div> <!-- Seed canvas container -->
            <div id="harvest-summary">Last update:</div>
        </div>
        <div id="growing-container">
            <h2>harvesting</h2>
            <div id="growing-wrapper"></div> <!-- Growing canvas container -->
            <div id="growing-summary">Methods used:<br>Days elapsed: 0/21<br>Last update:</div>
            <button id="seedFullscreenBtn">Fullscreen</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="common.js"></script>
    <script src="growth.js"></script> <!-- Ensure growth.js is included -->
    <script src="harvest.js"></script>
</body>
</html>
