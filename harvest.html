<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harvest Viewer</title>
  <link rel="stylesheet" href="harvest.css" />
</head>
<body data-mode="view">


  <!-- Canvas container, only contains the wrapper for the canvas -->
  <div id="growing-container">
    <div id="growing-wrapper"></div>
  </div>

  <!-- Header con input de búsqueda -->
  <div id="finder-header">
    <div id="headerpill"> Harvest</div>
    <div id="header-container">
      <form id="seed-finder">
        <label for="seedId"></label>
        <input type="text" id="seedId" maxlength="7">
        <button type="submit" id="lookupBtn">Search Seed</button>
        <div id="seedError"></div>
      </form>
    </div>
  </div>


  <!-- Moved no-growth-message and seedFullscreenBtn outside growing-container -->
  <div id="no-growth-message">
    No growth applied. Return to Root and click “Apply Growth” to start evolution.
  </div>
  <button id="seedFullscreenBtn">Fullscreen</button>

  <!-- Summary de crecimiento (fuera del canvas, visible encima) -->
  <div id="growing-summary" style="display: none;">
    <strong>Plant Stats</strong><br />
    <div id="plant-summary">Planted at: <span id="plant-date">—</span></div>
    Sun: <span id="sun-value">0</span><br />
    Water: <span id="water-value">0</span><br />
    Vitamins: <span id="vitamins-value">0</span><br />
    Days elapsed: <span id="days-elapsed">0</span>/<span id="total-days">21</span><br />
    Growth: <span id="growth-progress-text">0%</span><br />
    Last update: <span id="growth-last-update"></span><br />
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="https://unpkg.com/p5.fillgradient@0.1.2/dist/p5.fillGradient.min.js"></script>
  <script src="utils.js"></script>
  <script src="common.js"></script>
  <script src="growthfx.js"></script>
  <script src="harvest.js"></script>
  <script src="growth.js"></script>

</body>
</html>
