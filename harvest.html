<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HARVEST – Modulariem</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <div id="status-bar" style="
    position:fixed;
    top:0; left:0;
    width:100%;
    padding:4px;
    font-size:14px;
    background:rgba(255,255,255,0.9);
    z-index:10000;
    text-align:center;
  ">status: initializing…</div>
  <div class="grid-container">
    
    <!-- COLUMNA IZQUIERDA: buscador, título, etc. -->
    <div class="left-column" style="grid-column: 1 / span 3;">
      <h1 class="title">Harvest</h1>
      <p class="subtitle">Browser-based, modular poster garden</p>
      <p class="subtitle" style="margin-top: 20px; font-weight: bold;">Find Seed:</p>
      <div class="harvest-search">
        <input type="text" id="harvestSeedInput" placeholder="A01234"
               style="padding:6px; width:160px; border:1px solid #333; border-radius:4px;"/>
        <button id="findSeedBtn" class="button-black" style="margin-left:8px;">
          Find Seed
        </button>
        <p class="subtitle" style="margin-top: 20px; font-weight: bold;">View:</p>
        <!-- Harvest Controls -->
<div id="harvest-controls" style="margin-top:1em;">
    <!-- Toggle between original and growing views -->
    <label>
        <input type="radio" name="viewMode" value="original" checked> Original
      </label>
      <label>
        <input type="radio" name="viewMode" value="growing"> Growing
      </label>
        
     <!-- SAVE TO GARDEN -->
  <button id="saveToGardenBtn" class="button-black">
    Save to Garden
  </button>
</div>

<!-- Growth Timer Feedback -->
<div id="growth-timer" style="margin-top:8px; font-size:14px; color:#555;">
    Growth: 0:00 / 0:00
  </div>
  
      </div>
    </div>

    <!-- COLUMNA CENTRAL: aquí irá el canvas, idéntico al de la principal -->
    <div class="center-column" style="grid-column: 4 / span 5; position: relative;">
      <!-- fondo gris de la página principal -->
      <div class="canvas-background"></div>
      <!-- contenedor donde p5 inyecta el <canvas> -->
      <div class="canvas-container">
        <div id="main-canvas"></div>
      </div>
    </div>

  </div>

  <!-- lógica del buscador -->
  <script>
    document.getElementById('findSeedBtn').addEventListener('click', () => {
      const s = document.getElementById('harvestSeedInput')
                   .value.trim().toUpperCase();
      if (!/^[A-Z]\d{5}$/.test(s)) {
        return alert('Formato inválido: A–Z + 5 dígitos');
      }
      const ps = new URLSearchParams(location.search);
      ps.set('seed', s);
      window.location.search = ps.toString();
    });
    // rellenar el input con la seed actual
    document.addEventListener('DOMContentLoaded', () => {
      const s = new URLSearchParams(location.search).get('seed');
      if (s) document.getElementById('harvestSeedInput').value = s;
    });
  </script>



  <!-- tu script de p5 que dibuja el grid & visuals -->
  <script src="harvest.js"></script>
</body>
</html>
