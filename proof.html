<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seed ID Validation Test</title>
  <style>
    body { font-family: monospace; padding: 2rem; }
    #seedError { color: crimson; min-height: 1.2em; margin-bottom: .5rem; }
    input, button { font-family: monospace; font-size: 1rem; margin-bottom: .5rem; }
  </style>
</head>
<body>

  <label for="seedId">Seed ID (7 chars):</label><br/>
  <input
    type="text"
    id="seedId"
    placeholder="Enter 7-char seed…"
    maxlength="7"
    autocomplete="off"
    autocapitalize="characters"
  /><br/>

  <!-- error message appears here -->
  <div id="seedError"></div>

  <button type="button" id="lookupBtn">Lookup</button>

  <script>
    // wire up the lookup button
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('lookupBtn')
              .addEventListener('click', onLookup);
    });

    function onLookup(e) {
      // prevent form-type behavior (not strictly needed here but good practice)
      e.preventDefault && e.preventDefault();

      const seedId = document.getElementById('seedId').value.trim();
      const errEl = document.getElementById('seedError');

      console.log('onLookup fired, value:', seedId);
      if (!/^[A-Za-z0-9]{7}$/.test(seedId)) {
        errEl.textContent = '❌ Seed ID must be exactly 7 alphanumeric characters.';
        return;
      }
      // clear the error and show success
      errEl.textContent = '✅ Looks good!';
      // here you would call fetchAndRenderSeed(seedId)
    }
  </script>
</body>
</html>
